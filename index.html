<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIP CLIENT</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0b0f1a,#000000);

}

.container{
  max-width:400px;

  padding:20px;

  text-shadow:0 0 12px rgba(255,215,0,0.7);
}

h1{

}

.tagline{
  font-size:14px;
  color:#aaaaaa;
  margin-bottom:20px;
}

select{

  padding:12px;
  margin-top:10px;

  color:white;
}

.price{
  margin-top:10px;
  font-size:20px;

.qr{

  padding:15px;
  border-radius:15px;
  border:2px solid #FFD700;
  box-shadow:0 0 20px rgba(255,215,0,0.4);

.footer{

  color:#777;

</head>

<body>

<div class="footer">
© 2026 DRIP CLIENT

</html>
